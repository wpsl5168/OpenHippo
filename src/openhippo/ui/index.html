<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenHippo · 记忆面板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
[x-cloak]{display:none!important}
.bar{height:6px;background:#e2e8f0;border-radius:9999px;overflow:hidden}
.bar>div{height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);transition:width .4s}
.tag{display:inline-block;padding:2px 10px;margin:3px;border-radius:9999px;background:#eef2ff;color:#4338ca;font-size:12px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.tag:hover{background:#6366f1;color:#fff}
.tag.active{background:#4338ca;color:#fff;border-color:#312e81}
.spark{display:flex;align-items:flex-end;gap:2px;height:48px}
.spark>div{flex:1;background:linear-gradient(to top,#a855f7,#c4b5fd);border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}
.spark>div:hover{background:#6366f1}
.scroll-thin::-webkit-scrollbar{width:6px}
.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.fade{animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="hippoApp()" x-init="init()" x-cloak>

<!-- Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-lg">🧠</div>
    <div class="flex-1">
      <h1 class="font-bold text-lg leading-none">OpenHippo</h1>
      <div class="text-xs text-slate-500" x-text="version"></div>
    </div>
    <button @click="exportAll()" class="px-3 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-md flex items-center gap-1">
      <span>⬇</span> 导出全部
    </button>
    <button @click="showSettings = !showSettings" class="px-2 py-1.5 text-slate-500 hover:text-slate-900" title="设置 Token">⚙</button>
  </div>
</header>

<!-- Settings drawer -->
<div x-show="showSettings" x-transition class="bg-amber-50 border-b border-amber-200">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-2">
    <label class="text-sm text-slate-700">Bearer Token:</label>
    <input type="password" x-model="token" @blur="saveToken()" placeholder="粘贴 token 后失焦保存"
           class="flex-1 px-2 py-1 text-sm border border-amber-300 rounded font-mono">
    <button @click="reload()" class="px-3 py-1 text-sm bg-amber-600 text-white rounded">应用</button>
  </div>
</div>

<!-- Notify -->
<div x-show="notice" x-transition class="fixed top-20 right-4 z-50 px-4 py-2 rounded-lg shadow-lg text-sm"
     :class="noticeType==='err'?'bg-red-600 text-white':'bg-emerald-600 text-white'" x-text="notice"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

  <!-- Dashboard -->
  <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <!-- Total -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
      <div class="text-xs text-slate-500 mb-1">总记忆数</div>
      <div class="text-3xl font-bold text-slate-900" x-text="totalCount"></div>
      <div class="text-xs text-slate-400 mt-1">
        <span class="text-indigo-600" x-text="memCount"></span> memory ·
        <span class="text-purple-600" x-text="userCount"></span> user
      </div>
    </div>
    <!-- Memory capacity -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
      <div class="text-xs text-slate-500 mb-1">Memory 容量</div>
      <div class="text-2xl font-semibold text-slate-900" x-text="stats.hot_memory_usage || '—'"></div>
      <div class="bar mt-2"><div :style="`width:${memUsagePct}%`"></div></div>
    </div>
    <!-- User capacity -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
      <div class="text-xs text-slate-500 mb-1">User 容量</div>
      <div class="text-2xl font-semibold text-slate-900" x-text="stats.hot_user_usage || '—'"></div>
      <div class="bar mt-2"><div :style="`width:${userUsagePct}%`"></div></div>
    </div>
    <!-- Vector / DB -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
      <div class="text-xs text-slate-500 mb-1">向量 / DB</div>
      <div class="text-2xl font-semibold text-slate-900">
        <span x-text="stats.vec_count ?? 0"></span>
        <span class="text-sm text-slate-400">vec</span>
      </div>
      <div class="text-xs text-slate-400 mt-1" x-text="`${(stats.db_size_kb||0).toLocaleString()} KB`"></div>
    </div>
  </section>

  <!-- Activity + Tags -->
  <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <!-- Activity sparkline -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 lg:col-span-1">
      <div class="text-sm font-semibold text-slate-700 mb-3">最近 30 天活跃 <span class="text-xs text-slate-400 font-normal" x-text="`(共 ${activitySum} 条)`"></span></div>
      <div class="spark">
        <template x-for="(c, i) in activity" :key="i">
          <div :style="`height:${activityMax ? Math.max(2, c/activityMax*100) : 2}%`"
               :title="`${activityLabels[i]}: ${c} 条`"></div>
        </template>
      </div>
      <div class="flex justify-between text-[10px] text-slate-400 mt-1">
        <span>30天前</span><span>今天</span>
      </div>
    </div>

    <!-- Tag cloud -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 lg:col-span-2">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-semibold text-slate-700">话题标签 <span class="text-xs text-slate-400 font-normal">(从内容自动抽取)</span></div>
        <button x-show="activeTag" @click="activeTag=''; applyFilter()" class="text-xs text-indigo-600 hover:underline">清除筛选</button>
      </div>
      <div x-show="tags.length" class="flex flex-wrap">
        <template x-for="t in tags" :key="t.name">
          <span class="tag" :class="activeTag===t.name?'active':''"
                @click="activeTag = (activeTag===t.name?'':t.name); applyFilter()"
                :style="`font-size:${10 + Math.min(8, t.count)}px`"
                x-text="`${t.name} ${t.count}`"></span>
        </template>
      </div>
      <div x-show="!tags.length" class="text-xs text-slate-400">暂无可识别标签</div>
    </div>
  </section>

  <!-- Search + List + Detail -->
  <section class="grid grid-cols-1 lg:grid-cols-5 gap-4">
    <!-- List -->
    <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-100 flex flex-col" style="max-height:70vh">
      <div class="p-3 border-b border-slate-100 flex gap-2">
        <input x-model="searchQuery" @keyup.enter="reload()" @input.debounce.500ms="reload()"
               placeholder="搜索记忆… 留空显示全部"
               class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-500">
        <button @click="reload()" class="px-3 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg">↻</button>
      </div>
      <div class="px-3 py-2 text-xs text-slate-500 border-b border-slate-50 flex justify-between">
        <span x-text="`${filteredItems.length} 条${activeTag?' · 标签 '+activeTag:''}${searchQuery?' · 搜索 '+searchQuery:''}`"></span>
        <span class="text-slate-400" x-show="loading">加载中…</span>
      </div>
      <div class="overflow-y-auto scroll-thin flex-1">
        <template x-for="item in filteredItems" :key="item.id">
          <div @click="select(item)"
               :class="selected?.id===item.id ? 'bg-indigo-50 border-l-4 border-l-indigo-500' : 'border-l-4 border-l-transparent hover:bg-slate-50'"
               class="px-4 py-3 border-b border-slate-50 cursor-pointer fade">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-[10px] px-1.5 py-0.5 rounded font-medium"
                    :class="item.target==='user'?'bg-purple-100 text-purple-700':'bg-indigo-100 text-indigo-700'"
                    x-text="item.target"></span>
              <span class="text-[10px] text-slate-400" x-text="formatDate(item.updated_at)"></span>
            </div>
            <div class="text-sm text-slate-700 line-clamp-2" x-text="item.content.slice(0, 120)"></div>
          </div>
        </template>
        <div x-show="!loading && !filteredItems.length" class="p-8 text-center text-sm text-slate-400">
          无匹配记忆
        </div>
      </div>
    </div>

    <!-- Detail -->
    <div class="lg:col-span-3 bg-white rounded-xl shadow-sm border border-slate-100 p-5" style="min-height:300px">
      <template x-if="!selected">
        <div class="h-full flex items-center justify-center text-slate-400 text-sm">
          ← 从左侧选择一条记忆查看详情
        </div>
      </template>
      <template x-if="selected">
        <div class="fade">
          <div class="flex items-center gap-2 mb-3 flex-wrap">
            <span class="text-xs px-2 py-0.5 rounded font-medium"
                  :class="selected.target==='user'?'bg-purple-100 text-purple-700':'bg-indigo-100 text-indigo-700'"
                  x-text="selected.target"></span>
            <span class="text-xs text-slate-500" x-text="`ID: ${selected.id}`"></span>
            <span class="text-xs text-slate-400 ml-auto" x-text="formatDateFull(selected.updated_at)"></span>
          </div>
          <div class="bg-slate-50 rounded-lg p-4 text-sm text-slate-800 whitespace-pre-wrap font-sans leading-relaxed mb-4"
               x-text="selected.content"></div>
          <div class="flex items-center justify-between text-xs text-slate-500">
            <div>
              <span x-text="`${selected.content.length} 字`"></span>
              <span x-show="selected.created_at !== selected.updated_at"> · 创建于 <span x-text="formatDate(selected.created_at)"></span></span>
            </div>
            <button @click="remove(selected)" class="px-3 py-1.5 text-sm bg-red-50 hover:bg-red-100 text-red-700 rounded-md">
              删除此记忆
            </button>
          </div>
        </div>
      </template>
    </div>
  </section>

  <footer class="text-center text-xs text-slate-400 py-4">
    OpenHippo · Local-first AI memory engine ·
    <a href="https://github.com/wpsl5168/OpenHippo" target="_blank" class="hover:underline">GitHub</a>
  </footer>
</main>

<script>
function hippoApp() {
  return {
    // State
    version: 'v0.3.0',
    token: localStorage.getItem('hippo_token') || '',
    showSettings: false,
    loading: false,
    notice: '', noticeType: 'ok',
    stats: {},
    items: [],            // all memories merged
    selected: null,
    searchQuery: '',
    activeTag: '',
    tags: [],
    activity: new Array(30).fill(0),
    activityLabels: [],

    // Computed
    get totalCount() { return this.items.length },
    get memCount() { return this.items.filter(x => x.target === 'memory').length },
    get userCount() { return this.items.filter(x => x.target === 'user').length },
    get memUsagePct() {
      const u = this.stats.hot_memory_usage; if (!u) return 0;
      const [a, b] = u.split('/').map(Number); return Math.min(100, a/b*100);
    },
    get userUsagePct() {
      const u = this.stats.hot_user_usage; if (!u) return 0;
      const [a, b] = u.split('/').map(Number); return Math.min(100, a/b*100);
    },
    get activityMax() { return Math.max(...this.activity, 1) },
    get activitySum() { return this.activity.reduce((a,b)=>a+b, 0) },
    get filteredItems() {
      let xs = this.items;
      if (this.activeTag) {
        const t = this.activeTag.toLowerCase();
        xs = xs.filter(x => x.content.toLowerCase().includes(t));
      }
      return xs;  // search done server-side; tag filter client-side
    },

    // Init
    async init() {
      if (!this.token) this.showSettings = true;
      await this.reload();
    },
    saveToken() { localStorage.setItem('hippo_token', this.token); this.notify('Token 已保存'); },

    // API
    async api(method, path, body) {
      const opts = { method, headers: {} };
      if (this.token) opts.headers['Authorization'] = 'Bearer ' + this.token;
      if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`${res.status} ${txt.slice(0, 200)}`);
      }
      return res.json();
    },

    async reload() {
      this.loading = true;
      try {
        // stats
        this.stats = (await this.api('GET', '/v1/stats')).data;
        this.version = 'v' + (this.stats.version || '0.3.0') + ' · ' +
                       `${this.stats.hot_memory_count + this.stats.hot_user_count} hot / ${this.stats.cold_count} cold / ${this.stats.vec_count} vec`;
        // load items
        if (this.searchQuery.trim()) {
          await this.doSearch();
        } else {
          await this.loadAll();
        }
        // dashboard derive
        this.computeActivity();
        this.computeTags();
      } catch (e) {
        this.notify(e.message, 'err');
      } finally {
        this.loading = false;
      }
    },

    async loadAll() {
      // Hot (returns {memory:[], user:[]})
      const hotResp = (await this.api('GET', '/v1/memories/hot')).data;
      let items = [];
      if (Array.isArray(hotResp)) {
        items = hotResp.slice();
      } else {
        ['memory', 'user'].forEach(t => (hotResp[t] || []).forEach(x => items.push({ ...x, target: x.target || t })));
      }
      // Cold timeline
      const cold = (await this.api('GET', '/v1/memories/timeline?limit=500')).data || [];
      items = items.concat(cold);
      // dedupe by id, sort desc
      const seen = new Set();
      this.items = items.filter(x => !seen.has(x.id) && seen.add(x.id))
                        .sort((a, b) => (b.updated_at || 0) - (a.updated_at || 0));
    },

    async doSearch() {
      const r = await this.api('POST', '/v1/memories/search', {
        query: this.searchQuery, mode: 'hybrid', limit: 100,
      });
      const d = r.data;
      const items = [];
      (d.hot || []).forEach(x => items.push(x));
      (d.cold || []).forEach(x => items.push(x));
      const seen = new Set();
      this.items = items.filter(x => !seen.has(x.id) && seen.add(x.id))
                        .sort((a, b) => (b.updated_at || 0) - (a.updated_at || 0));
    },

    applyFilter() { /* purely client-side, computed handles it */ },

    select(item) { this.selected = item },

    async remove(item) {
      if (!confirm(`确认删除这条 ${item.target} 记忆？\n\n${item.content.slice(0, 100)}…`)) return;
      try {
        await this.api('POST', '/v1/memories/remove', { id: item.id, target: item.target });
        this.notify('已删除');
        this.selected = null;
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },

    async exportAll() {
      try {
        const r = await this.api('GET', '/v1/export');
        const blob = new Blob([JSON.stringify(r.data || r, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
        a.href = url; a.download = `openhippo-export-${ts}.json`;
        a.click();
        URL.revokeObjectURL(url);
        this.notify('导出完成');
      } catch (e) { this.notify(e.message, 'err'); }
    },

    // Activity (last 30 days)
    computeActivity() {
      const buckets = new Array(30).fill(0);
      const labels = [];
      const today = new Date(); today.setHours(0, 0, 0, 0);
      for (let i = 29; i >= 0; i--) {
        const d = new Date(today.getTime() - i * 86400000);
        labels.push(`${d.getMonth()+1}/${d.getDate()}`);
      }
      this.items.forEach(x => {
        const ts = (x.updated_at || x.created_at || 0) * 1000;
        if (!ts) return;
        const dayDiff = Math.floor((today.getTime() - ts) / 86400000);
        if (dayDiff >= 0 && dayDiff < 30) buckets[29 - dayDiff]++;
      });
      this.activity = buckets;
      this.activityLabels = labels;
    },

    // Tag extraction (frontend only — regex + word-freq)
    computeTags() {
      const counter = new Map();
      const bump = (k) => { if (!k || k.length < 2) return; counter.set(k, (counter.get(k)||0)+1); };

      // Curated stopwords (CN + EN)
      const stop = new Set(['the','and','for','with','from','this','that','you','your','are','was','were','have','has','had','can','not','but','our','use','using','one','two','etc','via','per','also','will','make','made','more','than','then','only','need','any','all','其中','以及','一个','可以','使用','用于','需要','不是','或者','但是','已经','可能','应该','所以','如果','因为','现在','这个','那个','一些','一下','一直','非常','比较','发现','作为','根据','通过','对于','关于','虽然','然后','所有','它的','他的','她的','以及','出来','起来','下来','前面','后面']);

      this.items.forEach(x => {
        const c = x.content;
        // 1. #hashtag style
        (c.match(/#[\w\u4e00-\u9fa5][\w\u4e00-\u9fa5\-_]{1,20}/g) || []).forEach(t => bump(t));
        // 2. 【bracketed】
        (c.match(/【([^】]{2,15})】/g) || []).forEach(m => bump(m.slice(1,-1)));
        // 3. CamelCase / PascalCase tech terms (3+)
        (c.match(/\b[A-Z][a-z]+(?:[A-Z][a-z]+)+\b/g) || []).forEach(t => bump(t));
        // 4. UPPER_SNAKE / acronyms (2-8 caps)
        (c.match(/\b[A-Z]{2,8}(?:_[A-Z0-9]+)*\b/g) || []).forEach(t => {
          if (!['THE','AND','FOR','BUT','YOU','OK','PR','API','URL','UI','ID','OS'].includes(t)) bump(t);
          else if (['API','UI','URL','PR','OS'].includes(t)) bump(t);  // keep these
        });
        // 5. backtick `code` segments
        (c.match(/`([^`\n]{2,30})`/g) || []).forEach(m => bump(m.slice(1,-1)));
        // 6. Chinese 2-3 char nouns via simple scan (项目名/工具名 in 《》 or quotes)
        (c.match(/《([^》]{2,10})》/g) || []).forEach(m => bump(m.slice(1,-1)));
        (c.match(/"([^"]{2,15})"/g) || []).forEach(m => bump(m.slice(1,-1)));
        (c.match(/"([^"]{2,15})"/g) || []).forEach(m => bump(m.slice(1,-1)));
      });

      // Filter + sort
      this.tags = Array.from(counter.entries())
        .filter(([k, v]) => v >= 2 && !stop.has(k.toLowerCase()) && k.length <= 25)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 30)
        .map(([name, count]) => ({ name, count }));
    },

    // Helpers
    formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000); const now = new Date();
      const diffH = (now - d) / 3600000;
      if (diffH < 1) return Math.max(1, Math.floor(diffH * 60)) + '分钟前';
      if (diffH < 24) return Math.floor(diffH) + '小时前';
      if (diffH < 24*7) return Math.floor(diffH/24) + '天前';
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    },
    formatDateFull(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000);
      return d.toLocaleString('zh-CN', { hour12: false });
    },
    notify(msg, type='ok') {
      this.notice = msg; this.noticeType = type;
      setTimeout(() => this.notice = '', 2500);
    },
  };
}
</script>
</body>
</html>
