<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenHippo · 海马体审查台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
  .scroll-y { overflow-y: auto; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  [x-cloak] { display: none !important; }
  .badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:500; }
  .pill { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; }
  .chip { background:#eef2ff; color:#4338ca; }
  .chip-warn { background:#fef3c7; color:#92400e; }
  .chip-ok { background:#d1fae5; color:#065f46; }
  .chip-err { background:#fee2e2; color:#991b1b; }
  .chip-mute { background:#f3f4f6; color:#4b5563; }
</style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="hippoApp()" x-init="init()" x-cloak>

<!-- Top bar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="px-4 py-2 flex items-center gap-3">
    <div class="font-semibold text-lg">🧠 OpenHippo</div>
    <span class="text-xs text-slate-500" x-text="`v${health?.version || '?'} · hot ${health?.metrics?.hot_entries ?? '-'} / cold ${health?.metrics?.cold_entries ?? '-'} / vec ${health?.metrics?.vec_entries ?? '-'}`"></span>
    <div class="flex-1"></div>
    <nav class="flex gap-1 text-sm">
      <button @click="tab='browse'" :class="tab==='browse' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-100'" class="px-3 py-1 rounded">浏览</button>
      <button @click="tab='dream'; loadDream()" :class="tab==='dream' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-100'" class="px-3 py-1 rounded">Dream</button>
      <button @click="tab='logs'; loadLogs()" :class="tab==='logs' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-100'" class="px-3 py-1 rounded">日志</button>
      <button @click="tab='settings'" :class="tab==='settings' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-100'" class="px-3 py-1 rounded">设置</button>
    </nav>
  </div>
</header>

<main class="p-4 max-w-[1400px] mx-auto">

<!-- ───── BROWSE TAB ───── -->
<section x-show="tab==='browse'" class="grid grid-cols-12 gap-4">

  <!-- Left: filters + list -->
  <div class="col-span-5 space-y-3">
    <div class="bg-white rounded-lg border border-slate-200 p-3">
      <div class="flex gap-2 mb-2">
        <input type="text" x-model="searchQuery" @keyup.enter="doSearch()" placeholder="搜索 (回车) — 留空显示全部"
               class="flex-1 px-3 py-1.5 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <button @click="doSearch()" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded hover:bg-indigo-700">搜</button>
      </div>
      <div class="flex flex-wrap gap-2 text-xs">
        <select x-model="targetFilter" @change="reload()" class="px-2 py-1 border border-slate-300 rounded">
          <option value="">全部 target</option>
          <option value="memory">memory</option>
          <option value="user">user</option>
        </select>
        <select x-model="sourceFilter" @change="reload()" class="px-2 py-1 border border-slate-300 rounded">
          <option value="all">Hot+Cold</option>
          <option value="hot">仅 Hot</option>
          <option value="cold">仅 Cold</option>
        </select>
        <select x-model="searchMode" class="px-2 py-1 border border-slate-300 rounded">
          <option value="hybrid">hybrid (RRF)</option>
          <option value="fts">FTS5</option>
          <option value="vector">向量</option>
        </select>
        <label class="flex items-center gap-1"><input type="checkbox" x-model="showConsolidated">含 consolidated</label>
        <label class="flex items-center gap-1"><input type="checkbox" x-model="showDormant">含 dormant</label>
      </div>
    </div>

    <div class="bg-white rounded-lg border border-slate-200">
      <div class="px-3 py-2 border-b border-slate-200 flex items-center justify-between text-sm">
        <span><span class="font-medium" x-text="items.length"></span> 条 · <span class="text-slate-500" x-text="listMode"></span></span>
        <button @click="reload()" class="text-indigo-600 hover:underline">刷新</button>
      </div>
      <div class="scroll-y" style="max-height: calc(100vh - 230px)">
        <template x-for="m in filteredItems" :key="m.id">
          <div @click="select(m)"
               :class="selected?.id === m.id ? 'bg-indigo-50 border-l-2 border-indigo-500' : 'border-l-2 border-transparent hover:bg-slate-50'"
               class="px-3 py-2 border-b border-slate-100 cursor-pointer">
            <div class="flex items-center gap-2 mb-1">
              <span class="badge" :class="m.source === 'hot' ? 'chip-ok' : 'chip-mute'" x-text="m.source || (m.frequency != null ? 'cold' : 'hot')"></span>
              <span class="badge chip" x-text="m.target"></span>
              <template x-if="m.dream_status && m.dream_status !== 'active'">
                <span class="badge" :class="m.dream_status === 'consolidated' ? 'chip-warn' : 'chip-err'" x-text="m.dream_status"></span>
              </template>
              <template x-if="m.score != null">
                <span class="badge chip-mute mono" x-text="m.score.toFixed(3)"></span>
              </template>
              <span class="ml-auto text-xs text-slate-400 mono" x-text="(m.id || '').slice(0,8)"></span>
            </div>
            <div class="text-sm text-slate-700 line-clamp-2" x-text="(m.content || '').slice(0, 200)"></div>
            <div class="mt-1 flex flex-wrap gap-1 items-center text-xs text-slate-500">
              <template x-for="t in (m.tags || [])"><span class="pill chip-mute" x-text="t"></span></template>
              <template x-if="m.access_count != null"><span>· 访 <span x-text="m.access_count"></span></span></template>
              <template x-if="m.created_at"><span>· <span x-text="fmtAge(m.created_at)"></span></span></template>
            </div>
          </div>
        </template>
        <template x-if="filteredItems.length === 0">
          <div class="px-3 py-8 text-center text-sm text-slate-400">无匹配</div>
        </template>
      </div>
    </div>
  </div>

  <!-- Right: detail -->
  <div class="col-span-7">
    <template x-if="!selected">
      <div class="bg-white rounded-lg border border-slate-200 p-8 text-center text-slate-400">
        点击左侧条目查看详情
      </div>
    </template>
    <template x-if="selected">
      <div class="bg-white rounded-lg border border-slate-200">
        <div class="px-4 py-3 border-b border-slate-200 flex items-center gap-2">
          <span class="badge" :class="selected.source === 'hot' ? 'chip-ok' : 'chip-mute'" x-text="selected.source || 'cold'"></span>
          <span class="badge chip" x-text="selected.target"></span>
          <template x-if="selected.dream_status && selected.dream_status !== 'active'">
            <span class="badge" :class="selected.dream_status === 'consolidated' ? 'chip-warn' : 'chip-err'" x-text="selected.dream_status"></span>
          </template>
          <span class="mono text-xs text-slate-500 ml-2" x-text="selected.id"></span>
          <button @click="copy(selected.id)" class="text-xs text-indigo-600 hover:underline">复制</button>
        </div>

        <div class="p-4 space-y-4">
          <div>
            <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Content</label>
            <textarea x-model="editContent" rows="10"
                      class="mt-1 w-full px-3 py-2 border border-slate-300 rounded text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
            <div class="mt-1 text-xs text-slate-400">
              <span x-text="editContent.length"></span> chars
              <template x-if="editContent !== (selected.content || '')">
                <span class="text-amber-600">· 已修改</span>
              </template>
            </div>
          </div>

          <div class="flex flex-wrap gap-2">
            <button @click="saveEdit()" :disabled="editContent === (selected.content || '') || selected.source === 'hot'"
                    class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed">
              💾 保存 (PUT)
            </button>
            <template x-if="selected.source === 'hot'">
              <button @click="archive()" class="px-3 py-1.5 bg-amber-600 text-white text-sm rounded hover:bg-amber-700">归档到 cold</button>
            </template>
            <template x-if="selected.source !== 'hot'">
              <button @click="promote()" class="px-3 py-1.5 bg-emerald-600 text-white text-sm rounded hover:bg-emerald-700">提升到 hot</button>
            </template>
            <template x-if="selected.dream_status && selected.dream_status !== 'active'">
              <button @click="restore()" class="px-3 py-1.5 bg-sky-600 text-white text-sm rounded hover:bg-sky-700">↺ 恢复 (Dream restore)</button>
            </template>
            <button @click="del()" class="ml-auto px-3 py-1.5 bg-red-600 text-white text-sm rounded hover:bg-red-700">🗑 删除</button>
          </div>

          <div class="grid grid-cols-2 gap-3 text-sm pt-3 border-t border-slate-200">
            <template x-for="(v, k) in metaFields(selected)" :key="k">
              <div>
                <div class="text-xs font-medium text-slate-500 uppercase tracking-wide" x-text="k"></div>
                <div class="mono text-slate-700 break-all" x-text="v"></div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</section>

<!-- ───── DREAM TAB ───── -->
<section x-show="tab==='dream'" class="space-y-4">

  <!-- Scheduler + metrics -->
  <div class="bg-white rounded-lg border border-slate-200 p-4">
    <div class="flex items-center mb-3">
      <h2 class="font-semibold">F5 Dream — 自动整理调度器</h2>
      <button @click="loadDream()" class="ml-auto text-sm text-indigo-600 hover:underline">刷新</button>
    </div>
    <template x-if="dreamMetrics">
      <div class="grid grid-cols-4 gap-4 text-sm">
        <div>
          <div class="text-xs text-slate-500">自动调度</div>
          <div class="font-semibold" :class="dreamMetrics.scheduler?.auto_enabled ? 'text-emerald-600' : 'text-slate-400'">
            <span x-text="dreamMetrics.scheduler?.auto_enabled ? '✓ 启用' : '✗ 禁用'"></span>
          </div>
          <div class="text-xs text-slate-400 mt-0.5" x-text="`周期 ${(dreamMetrics.scheduler?.interval_seconds/3600).toFixed(1)}h`"></div>
        </div>
        <div>
          <div class="text-xs text-slate-500">已执行</div>
          <div class="font-semibold" x-text="`${dreamMetrics.scheduler?.iterations_succeeded}/${dreamMetrics.scheduler?.iterations_total}`"></div>
          <div class="text-xs text-slate-400 mt-0.5" x-text="`下次 ${fmtTs(dreamMetrics.scheduler?.next_run_at)}`"></div>
        </div>
        <div>
          <div class="text-xs text-slate-500">总整合 / 遗忘</div>
          <div class="font-semibold" x-text="`${dreamMetrics.persistent?.totals?.consolidated || 0} / ${dreamMetrics.persistent?.totals?.forgotten || 0}`"></div>
          <div class="text-xs text-slate-400 mt-0.5" x-text="`候选 ${dreamMetrics.persistent?.totals?.candidates || 0} · 簇 ${dreamMetrics.persistent?.totals?.clusters || 0}`"></div>
        </div>
        <div>
          <div class="text-xs text-slate-500">最近一次</div>
          <div class="font-semibold mono text-xs" x-text="dreamMetrics.persistent?.last_run?.status || 'n/a'"></div>
          <div class="text-xs text-slate-400 mt-0.5" x-text="`${dreamMetrics.persistent?.last_run?.duration_ms || 0}ms`"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- Manual run -->
  <div class="bg-white rounded-lg border border-slate-200 p-4">
    <h2 class="font-semibold mb-3">手动触发</h2>
    <div class="grid grid-cols-4 gap-3 text-sm mb-3">
      <label>L2 阈值
        <input type="number" step="0.05" min="0.1" max="2.0" x-model.number="dreamCfg.l2_threshold" class="mt-1 w-full px-2 py-1 border border-slate-300 rounded">
      </label>
      <label>最小簇大小
        <input type="number" min="2" max="20" x-model.number="dreamCfg.min_cluster_size" class="mt-1 w-full px-2 py-1 border border-slate-300 rounded">
      </label>
      <label>Target
        <select x-model="dreamCfg.target" class="mt-1 w-full px-2 py-1 border border-slate-300 rounded">
          <option :value="null">全部</option>
          <option value="memory">memory</option>
          <option value="user">user</option>
        </select>
      </label>
      <label class="flex items-center gap-2 self-end pb-1">
        <input type="checkbox" x-model="dreamCfg.enable_forget"> 启用 forget (默认关)
      </label>
    </div>
    <div class="flex gap-2">
      <button @click="dreamPreview()" class="px-3 py-1.5 bg-slate-700 text-white text-sm rounded hover:bg-slate-800">👁 Preview (无副作用)</button>
      <button @click="dreamRun()" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded hover:bg-indigo-700">▶ 执行 (会修改)</button>
    </div>
    <template x-if="lastDreamResult">
      <pre class="mt-3 p-3 bg-slate-50 border border-slate-200 rounded text-xs mono scroll-y" style="max-height: 200px" x-text="JSON.stringify(lastDreamResult, null, 2)"></pre>
    </template>
  </div>

  <!-- Runs list -->
  <div class="bg-white rounded-lg border border-slate-200">
    <div class="px-4 py-3 border-b border-slate-200">
      <h2 class="font-semibold">最近 Runs</h2>
    </div>
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs text-slate-500 uppercase">
        <tr>
          <th class="px-3 py-2 text-left">ID</th>
          <th class="px-3 py-2 text-left">状态</th>
          <th class="px-3 py-2 text-right">候选</th>
          <th class="px-3 py-2 text-right">簇</th>
          <th class="px-3 py-2 text-right">整合</th>
          <th class="px-3 py-2 text-right">遗忘</th>
          <th class="px-3 py-2 text-right">耗时</th>
          <th class="px-3 py-2 text-left">开始时间</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="r in dreamRuns" :key="r.id">
          <tr class="border-t border-slate-100 hover:bg-slate-50">
            <td class="px-3 py-2 mono text-xs" x-text="r.id?.slice(0,8)"></td>
            <td class="px-3 py-2">
              <span class="badge" :class="r.status === 'completed' ? 'chip-ok' : (r.status === 'preview' ? 'chip' : 'chip-err')" x-text="r.status"></span>
            </td>
            <td class="px-3 py-2 text-right mono" x-text="r.candidates_count"></td>
            <td class="px-3 py-2 text-right mono" x-text="r.clusters_count"></td>
            <td class="px-3 py-2 text-right mono" x-text="r.consolidated_count"></td>
            <td class="px-3 py-2 text-right mono" x-text="r.forgotten_count"></td>
            <td class="px-3 py-2 text-right mono text-slate-500" x-text="r.duration_ms ? r.duration_ms+'ms' : '-'"></td>
            <td class="px-3 py-2 text-xs text-slate-500" x-text="(r.started_at || '').replace('T',' ').slice(0,19)"></td>
          </tr>
        </template>
        <template x-if="dreamRuns.length === 0">
          <tr><td colspan="8" class="px-3 py-8 text-center text-slate-400">无</td></tr>
        </template>
      </tbody>
    </table>
  </div>
</section>

<!-- ───── LOGS TAB ───── -->
<section x-show="tab==='logs'" class="bg-white rounded-lg border border-slate-200">
  <div class="px-4 py-3 border-b border-slate-200 flex items-center">
    <h2 class="font-semibold">操作日志</h2>
    <button @click="loadLogs()" class="ml-auto text-sm text-indigo-600 hover:underline">刷新</button>
  </div>
  <table class="w-full text-sm">
    <thead class="bg-slate-50 text-xs text-slate-500 uppercase">
      <tr>
        <th class="px-3 py-2 text-left">时间</th>
        <th class="px-3 py-2 text-left">操作</th>
        <th class="px-3 py-2 text-left">Target</th>
        <th class="px-3 py-2 text-left">摘要</th>
      </tr>
    </thead>
    <tbody>
      <template x-for="(l, idx) in logs" :key="idx">
        <tr class="border-t border-slate-100">
          <td class="px-3 py-2 text-xs text-slate-500 mono" x-text="(l.timestamp || '').replace('T',' ').slice(0,19)"></td>
          <td class="px-3 py-2"><span class="badge chip" x-text="l.action || l.op || '?'"></span></td>
          <td class="px-3 py-2 text-xs" x-text="l.target || '-'"></td>
          <td class="px-3 py-2 text-xs text-slate-600" x-text="(l.summary || l.content || JSON.stringify(l)).slice(0, 120)"></td>
        </tr>
      </template>
      <template x-if="logs.length === 0">
        <tr><td colspan="4" class="px-3 py-8 text-center text-slate-400">无</td></tr>
      </template>
    </tbody>
  </table>
</section>

<!-- ───── SETTINGS TAB ───── -->
<section x-show="tab==='settings'" class="bg-white rounded-lg border border-slate-200 p-4 max-w-xl">
  <h2 class="font-semibold mb-3">设置</h2>
  <label class="block mb-3">
    <div class="text-sm text-slate-700 mb-1">API Bearer Token (可选)</div>
    <input type="password" x-model="token" @change="saveToken()"
           placeholder="留空使用未鉴权模式"
           class="w-full px-3 py-1.5 border border-slate-300 rounded text-sm mono focus:outline-none focus:ring-2 focus:ring-indigo-400">
    <div class="text-xs text-slate-400 mt-1">存储在浏览器 localStorage，仅本机可见</div>
  </label>
  <label class="block mb-3">
    <div class="text-sm text-slate-700 mb-1">API Base URL</div>
    <input type="text" x-model="apiBase" @change="saveApiBase()"
           class="w-full px-3 py-1.5 border border-slate-300 rounded text-sm mono">
    <div class="text-xs text-slate-400 mt-1">默认与本页同源</div>
  </label>
  <div class="pt-3 border-t border-slate-200 mt-3">
    <button @click="testConn()" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded hover:bg-indigo-700">测试连接</button>
    <span class="ml-2 text-sm" :class="testResult.startsWith('✓') ? 'text-emerald-600' : 'text-red-600'" x-text="testResult"></span>
  </div>
  <div class="pt-4 mt-4 border-t border-slate-200 text-xs text-slate-500">
    <div>导出 / 导入入口：</div>
    <div class="mt-2 flex flex-wrap gap-2">
      <a :href="apiBase + '/v1/export?format=json'" target="_blank" class="text-indigo-600 hover:underline">下载 JSON</a>
      <a :href="apiBase + '/v1/export?format=jsonl'" target="_blank" class="text-indigo-600 hover:underline">下载 JSONL</a>
      <a :href="apiBase + '/v1/export?format=markdown'" target="_blank" class="text-indigo-600 hover:underline">下载 Markdown</a>
      <a :href="apiBase + '/v1/export?format=csv'" target="_blank" class="text-indigo-600 hover:underline">下载 CSV</a>
    </div>
  </div>
</section>

<!-- Toast -->
<div x-show="toast.msg" x-transition
     :class="toast.kind === 'err' ? 'bg-red-600' : 'bg-slate-800'"
     class="fixed bottom-4 right-4 text-white text-sm px-4 py-2 rounded shadow-lg z-50" x-text="toast.msg"></div>

</main>

<script>
function hippoApp() {
  return {
    // ── State
    tab: 'browse',
    apiBase: localStorage.getItem('hippo.apiBase') || '',
    token: localStorage.getItem('hippo.token') || '',
    health: null,
    items: [],
    listMode: '',
    selected: null,
    editContent: '',
    searchQuery: '',
    targetFilter: '',
    sourceFilter: 'all',
    searchMode: 'hybrid',
    showConsolidated: false,
    showDormant: false,
    dreamMetrics: null,
    dreamRuns: [],
    dreamCfg: { l2_threshold: 0.55, min_cluster_size: 2, target: null, enable_forget: false },
    lastDreamResult: null,
    logs: [],
    toast: { msg: '', kind: '' },
    testResult: '',

    // ── Init
    async init() {
      if (!this.apiBase) this.apiBase = window.location.origin;
      try {
        this.health = await this.api('GET', '/health');
        await this.reload();
      } catch (e) { this.notify('连接失败: ' + e.message, 'err'); }
    },

    // ── HTTP
    async api(method, path, body) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
      const res = await fetch(this.apiBase + path, {
        method, headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`${res.status} ${txt.slice(0, 200)}`);
      }
      return await res.json();
    },

    // ── Browse
    async reload() {
      this.selected = null;
      try {
        if (this.searchQuery.trim()) {
          await this.doSearch();
        } else {
          await this.loadAll();
        }
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async loadAll() {
      // Hot list
      const hot = (this.sourceFilter === 'cold') ? [] : (await this.api('GET', '/v1/memories/hot')).data;
      let hotItems = [];
      if (Array.isArray(hot)) {
        hotItems = hot.map(x => ({ ...x, source: 'hot' }));
      } else {
        ['memory', 'user'].forEach(t => (hot[t] || []).forEach(x => hotItems.push({ ...x, source: 'hot', target: t })));
      }
      // Cold timeline
      let cold = [];
      if (this.sourceFilter !== 'hot') {
        const tQ = this.targetFilter ? `?target=${this.targetFilter}&limit=200` : '?limit=200';
        cold = (await this.api('GET', '/v1/memories/timeline' + tQ)).data || [];
        cold = cold.map(x => ({ ...x, source: 'cold' }));
      }
      if (this.targetFilter) hotItems = hotItems.filter(x => x.target === this.targetFilter);
      this.items = [...hotItems, ...cold];
      this.listMode = 'browse';
    },
    async doSearch() {
      if (!this.searchQuery.trim()) return this.loadAll();
      const r = await this.api('POST', '/v1/memories/search', {
        query: this.searchQuery,
        target: this.targetFilter || 'memory',
        source: this.sourceFilter,
        mode: this.searchMode,
        limit: 50,
      });
      const d = r.data;
      const items = [];
      (d.hot || []).forEach(x => items.push({ ...x, source: 'hot' }));
      (d.cold || []).forEach(x => items.push({ ...x, source: 'cold' }));
      this.items = items;
      this.listMode = `search · ${d.total || items.length} hits`;
    },
    get filteredItems() {
      return this.items.filter(m => {
        const ds = m.dream_status;
        if (!this.showConsolidated && ds === 'consolidated') return false;
        if (!this.showDormant && ds === 'dormant') return false;
        return true;
      });
    },
    select(m) {
      this.selected = m;
      this.editContent = m.content || '';
      // Lazy-load full record by ID for cold (timeline rows may be lean)
      if (m.id && m.source === 'cold') {
        this.api('GET', '/v1/memories/' + m.id).then(r => {
          this.selected = r.data;
          this.editContent = r.data.content || '';
        }).catch(()=>{});
      }
    },
    metaFields(m) {
      const out = {};
      ['target','agent_id','scope','importance','access_count','frequency','dream_status','consolidated_into','content_hash'].forEach(k => {
        if (m[k] != null) out[k] = String(m[k]);
      });
      if (m.created_at) out.created_at = String(m.created_at);
      if (m.updated_at) out.updated_at = String(m.updated_at);
      if (m.merged_from) {
        try { out.merged_from = JSON.stringify(typeof m.merged_from === 'string' ? JSON.parse(m.merged_from) : m.merged_from); }
        catch { out.merged_from = String(m.merged_from); }
      }
      if (m.tags) out.tags = (Array.isArray(m.tags) ? m.tags : []).join(', ');
      return out;
    },
    async saveEdit() {
      if (!this.selected || this.selected.source === 'hot') return;
      try {
        await this.api('PUT', '/v1/memories/' + this.selected.id, { content: this.editContent });
        this.selected.content = this.editContent;
        this.notify('✓ 已保存');
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async del() {
      if (!this.selected) return;
      if (!confirm(`确定删除？\n${this.selected.id}\n${(this.selected.content||'').slice(0,80)}`)) return;
      try {
        if (this.selected.source === 'hot') {
          await this.api('POST', '/v1/memories/remove', { target: this.selected.target, old_text: this.selected.content });
        } else {
          await this.api('DELETE', '/v1/memories/' + this.selected.id);
        }
        this.notify('✓ 已删除');
        this.selected = null;
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async archive() {
      try {
        await this.api('POST', '/v1/memories/archive', { target: this.selected.target, old_text: this.selected.content });
        this.notify('✓ 已归档到 cold');
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async promote() {
      try {
        await this.api('POST', '/v1/memories/promote', { memory_id: this.selected.id });
        this.notify('✓ 已提升到 hot');
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async restore() {
      try {
        await this.api('POST', '/v1/dream/restore/' + this.selected.id);
        this.notify('✓ 已恢复');
        await this.reload();
      } catch (e) { this.notify(e.message, 'err'); }
    },

    // ── Dream
    async loadDream() {
      try {
        this.dreamMetrics = (await this.api('GET', '/v1/dream/metrics')).data;
        this.dreamRuns = (await this.api('GET', '/v1/dream/runs?limit=20')).data || [];
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async dreamPreview() {
      try {
        const r = await this.api('POST', '/v1/dream/preview', this.dreamCfg);
        this.lastDreamResult = r.data;
        this.notify(`✓ Preview: ${r.data.clusters_count || 0} 簇`);
        await this.loadDream();
      } catch (e) { this.notify(e.message, 'err'); }
    },
    async dreamRun() {
      if (!confirm('执行 Dream 会修改数据（可通过 restore 回滚）。继续？')) return;
      try {
        const r = await this.api('POST', '/v1/dream/run', this.dreamCfg);
        this.lastDreamResult = r.data;
        this.notify(`✓ 整合 ${r.data.consolidated_count || 0} 条`);
        await this.loadDream();
      } catch (e) { this.notify(e.message, 'err'); }
    },

    // ── Logs
    async loadLogs() {
      try {
        const r = await this.api('GET', '/v1/logs?limit=100');
        this.logs = r.data || [];
      } catch (e) { this.notify(e.message, 'err'); }
    },

    // ── Settings
    saveToken() { localStorage.setItem('hippo.token', this.token || ''); },
    saveApiBase() { localStorage.setItem('hippo.apiBase', this.apiBase || ''); },
    async testConn() {
      try {
        const h = await this.api('GET', '/health');
        this.health = h;
        this.testResult = `✓ 连通 v${h.version} hot=${h.metrics?.hot_entries} cold=${h.metrics?.cold_entries}`;
      } catch (e) { this.testResult = '✗ ' + e.message; }
    },

    // ── Utils
    notify(msg, kind='ok') {
      this.toast = { msg, kind };
      setTimeout(() => { this.toast = { msg: '', kind: '' }; }, 3000);
    },
    copy(text) { navigator.clipboard?.writeText(text); this.notify('已复制'); },
    fmtAge(iso) {
      const t = typeof iso === 'string' ? new Date(iso).getTime() : iso * 1000;
      const sec = (Date.now() - t) / 1000;
      if (sec < 60) return '刚刚';
      if (sec < 3600) return Math.floor(sec / 60) + '分钟前';
      if (sec < 86400) return Math.floor(sec / 3600) + '小时前';
      return Math.floor(sec / 86400) + '天前';
    },
    fmtTs(epoch) {
      if (!epoch) return 'n/a';
      const d = new Date(epoch * 1000);
      return d.toISOString().replace('T',' ').slice(0, 19);
    },
  }
}
</script>
